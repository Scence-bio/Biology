<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immunology Chapter - بەشی ئیمیونۆلۆجی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'NotoKufiArabic';
            src: url('./NotoKufiArabic-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body {
            font-family: 'NotoKufiArabic', 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            line-height: 1.6; min-height: 100vh; color: #1e293b;
        }

        .book-container {
            max-width: 1200px; margin: 0 auto;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
            border-radius: 25px; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .progress-bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: rgba(0,0,0,0.1); z-index: 1000; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #3b82f6, #ef4444); transition: width 0.3s ease; }

        .print-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #22c55e; color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(34,197,94,0.4);
            z-index: 100; transition: all 0.3s ease;
        }
        .print-btn:hover { transform: translateY(-3px) scale(1.1); box-shadow: 0 8px 20px rgba(34,197,94,0.6); }

        .scroll-top-btn {
            position: fixed; bottom: 100px; right: 20px;
            background: #3b82f6; color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            font-size: 20px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(59,130,246,0.4);
            transition: opacity 0.3s ease; z-index: 99;
        }

        .chapter-page { padding: 60px 50px; min-height: 100vh; }

        .chapter-header {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: white; padding: 40px; border-radius: 25px;
            margin-bottom: 50px; text-align: center; position: relative; overflow: hidden;
        }
        .chapter-header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(34,197,94,0.1), rgba(59,130,246,0.1));
        }
        .chapter-number { font-size: 1.3em; opacity: 0.8; margin-bottom: 15px; position: relative; z-index: 2; }
        .chapter-main-title { font-family: 'Georgia', serif; font-size: 2.8em; font-weight: 700; margin-bottom: 20px; position: relative; z-index: 2; }
        .chapter-description { font-size: 1.2em; opacity: 0.9; position: relative; z-index: 2; }

        .filter-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn {
            background: #e2e8f0; border: none; padding: 10px 20px;
            border-radius: 30px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; font-family: inherit;
        }
        .filter-btn.active, .filter-btn:hover { background: #22c55e; color: white; }

        .slide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin: 50px 0; }

        .slide-card {
            background: white; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
            overflow: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative; opacity: 0; transform: translateY(50px);
        }
        .slide-card.visible { opacity: 1; transform: translateY(0); }
        .slide-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(34,197,94,0.2); }

        .slide-header {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; padding: 25px; text-align: center; position: relative;
        }
        .slide-header::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: linear-gradient(90deg, #3b82f6, #ef4444, #f59e0b);
        }
        .slide-number { font-size: 1.6em; font-weight: 800; }

        .image-wrapper { display: flex; justify-content: center; padding: 20px; background: #f8f9fa; }
        .slide-image {
            width: 200px; height: 200px; object-fit: cover;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #e9ecef;
        }

        .slide-content { padding: 30px; }
        .slide-title { font-weight: 700; color: #0f172a; margin-bottom: 20px; font-size: 1.4em; border-bottom: 2px solid #22c55e; padding-bottom: 10px; }

        .components-list { margin: 20px 0; }
        .components-title { color: #1e293b; font-weight: 700; margin-bottom: 15px; font-size: 1.1em; }
        .component-item {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            padding: 12px 16px; margin: 8px 0; border-radius: 10px;
            border-left: 4px solid #22c55e; transition: all 0.3s ease;
        }
        .component-item:hover { transform: translateX(5px); background: linear-gradient(135deg, #bbf7d0, #86efac); }

        .section-wrapper { margin: 25px 0; }
        .section-title { color: #0f172a; font-weight: 700; margin-bottom: 15px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: linear-gradient(135deg, #3b82f6, #22c55e); border-radius: 2px; }

        .item-list { list-style: none; padding: 0; }

        /* location */
        .item-list.location li { background: linear-gradient(135deg, #e0f2fe, #b3e5fc); padding: 12px 16px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #0891b2; transition: all 0.3s ease; position: relative; }
        .item-list.location li:hover { transform: translateX(5px); background: linear-gradient(135deg, #b3e5fc, #81d4fa); }
        .item-list.location li::before { content: '📍'; margin-right: 8px; font-size: 1.1em; }

        /* function */
        .item-list.function li { background: linear-gradient(135deg, #fef3c7, #fde68a); padding: 12px 16px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #f59e0b; transition: all 0.3s ease; position: relative; }
        .item-list.function li:hover { transform: translateX(5px); background: linear-gradient(135deg, #fde68a, #fcd34d); }
        .item-list.function li::before { content: '▶'; color: #f59e0b; margin-right: 8px; }

        /* causes */
        .item-list.causes li { background: linear-gradient(135deg, #fee2e2, #fecaca); padding: 12px 16px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #ef4444; transition: all 0.3s ease; position: relative; }
        .item-list.causes li:hover { transform: translateX(5px); background: linear-gradient(135deg, #fecaca, #fca5a5); }
        .item-list.causes li::before { content: '⚡'; color: #ef4444; margin-right: 8px; }

        /* symptoms */
        .item-list.symptoms li { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); padding: 12px 16px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #8b5cf6; transition: all 0.3s ease; position: relative; }
        .item-list.symptoms li:hover { transform: translateX(5px); background: linear-gradient(135deg, #e9d5ff, #ddd6fe); }
        .item-list.symptoms li::before { content: '🔸'; color: #8b5cf6; margin-right: 8px; }

        @media (max-width: 992px) { .slide-grid { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); } }
        @media (max-width: 768px) { .slide-grid { grid-template-columns: 1fr; } .chapter-main-title { font-size: 2em; } .chapter-page { padding: 40px 25px; } }
        @media print { .progress-bar, .print-btn, .scroll-top-btn { display: none !important; } .slide-card { break-inside: avoid; margin-bottom: 20px; } }
    </style>
</head>
<body>

<div id="app">
    <div style="position:fixed;left:20px;top:20px;z-index:2000">
        <a href="https://scence-bio.github.io/Biology/"
           style="text-decoration:none;background:#22c55e;color:white;padding:10px 14px;border-radius:10px;font-weight:600;">
            back to home - گەڕانەوە بۆ سەرەکی
        </a>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" :style="{ width: scrollProgress + '%' }"></div>
    </div>

    <button class="print-btn" @click="printPage">🖨️</button>
    <button class="scroll-top-btn" :style="{ opacity: showScrollTop ? 1 : 0 }" @click="scrollTop">↑</button>

    <div class="book-container">
        <div class="chapter-page" id="immunology">
            <div class="chapter-header">
                <div class="chapter-number">Chapter 10</div>
                <h2 class="chapter-main-title">🛡️ Immunology - Study of Immune System</h2>
                <p class="chapter-description">Microscopic examination of immune organs, cells, and pathological conditions</p>
            </div>

            <div class="filter-controls">
                <button v-for="f in filters" :key="f.value" class="filter-btn"
                    :class="{ active: activeFilter === f.value }"
                    @click="activeFilter = f.value">{{ f.label }}</button>
            </div>

            <div class="slide-grid">
                <div v-for="slide in filteredSlides" :key="slide.id"
                    class="slide-card" :class="{ visible: slide.visible }"
                    :data-category="slide.category">
                    <div class="slide-header">
                        <div class="slide-number">Slide {{ slide.id }}</div>
                    </div>
                    <div class="image-wrapper">
                        <img :src="'images/Immunology/' + slide.id + '.jpg'" :alt="slide.title"
                            class="slide-image" @error="handleImgError($event)" />
                    </div>
                    <div class="slide-content">
                        <div class="slide-title">{{ slide.title }}</div>
                        <div class="components-list">
                            <div class="components-title">Components:</div>
                            <div class="component-item" v-for="(c, i) in slide.components" :key="i">{{ c }}</div>
                        </div>
                        <template v-for="(sec, i) in slide.sections" :key="i">
                            <div class="section-wrapper">
                                <div class="section-title">{{ sec.label }}</div>
                                <ul class="item-list" :class="sec.type">
                                    <li v-for="(item, j) in sec.items" :key="j">{{ item }}</li>
                                </ul>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, reactive, onMounted, onUnmounted, nextTick } = Vue;

createApp({
    setup() {
        const activeFilter = ref('all');
        const scrollProgress = ref(0);
        const showScrollTop = ref(false);

        const filters = [
            { value: 'all', label: 'All Slides' },
            { value: 'lymphoid', label: 'Lymphoid Organs' },
            { value: 'cells', label: 'Immune Cells' },
            { value: 'autoimmune', label: 'Autoimmune Diseases' },
            { value: 'immunodeficiency', label: 'Immunodeficiency' },
            { value: 'cancer', label: 'Cancer' },
            { value: 'infectious', label: 'Infectious Diseases' },
        ];

        const slides = reactive([
            {
                id: 1, category: 'lymphoid', visible: false,
                title: 'Thymus – cortex & medulla',
                components: [
                    'Darkly stained cortex with immature T-cells (thymocytes)',
                    'Epithelial reticular cells',
                    'Lighter stained medulla with mature T-cells',
                    'Hassall\'s corpuscles (concentric structures)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Superior mediastinum (upper chest cavity) Behind the sternum'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Cortex: T-cell proliferation and positive selection', 'Medulla: Negative selection and final T-cell maturation', 'Essential for adaptive immunity development'] },
                ],
            },
            {
                id: 2, category: 'lymphoid', visible: false,
                title: 'Lymph node – cortex & medulla',
                components: [
                    'Cortex with lymphoid follicles',
                    'Primary follicles (small, inactive B-cells)',
                    'Secondary follicles with germinal centers',
                    'Medullary cords (lymphocytes and plasma cells)',
                    'Medullary sinuses (lymph-filled spaces)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Throughout the body along lymphatic vessels', 'Neck, axilla, groin, and internal body regions'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Filters lymph and traps pathogens', 'Initiates immune responses in cortex', 'Antibody production in medulla'] },
                ],
            },
            {
                id: 3, category: 'lymphoid', visible: false,
                title: 'Spleen – white pulp & red pulp',
                components: [
                    'White pulp: lymphoid tissue around central arteries',
                    'Periarteriolar lymphoid sheath (PALS) - T-cells',
                    'Lymphoid follicles - B-cells with germinal centers',
                    'Red pulp: splenic cords and sinusoids',
                    'Macrophages and blood cells in red pulp',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Left upper quadrant of abdomen', 'Below the diaphragm, behind the stomach'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['White pulp: immune surveillance of blood', 'Red pulp: filters blood, removes old RBCs', 'Platelet storage and pathogen clearance'] },
                ],
            },
            {
                id: 4, category: 'lymphoid', visible: false,
                title: 'Tonsil (palatine tonsil)',
                components: [
                    'Stratified squamous epithelium surface',
                    'Crypts increasing surface area',
                    'Primary follicles (inactive B-cells)',
                    'Secondary follicles with germinal centers',
                    'T-lymphocytes in interfollicular regions',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Either side of the oropharynx'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Traps and samples pathogens from mouth/nose', 'Initiates immune responses', 'Local immunity in oropharyngeal region'] },
                ],
            },
            {
                id: 5, category: 'cells', visible: false,
                title: 'Macrophages',
                components: [
                    'Large, irregularly shaped cells',
                    'Abundant cytoplasm with lysosomes',
                    'Phagocytic vesicles',
                    'Oval or kidney-shaped nucleus',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Throughout body tissues', 'Kupffer cells in liver', 'Alveolar macrophages in lungs', 'Derived from blood monocytes'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Phagocytosis of pathogens and debris', 'Antigen presentation to T-cells', 'Cytokine secretion for inflammation'] },
                ],
            },
            {
                id: 6, category: 'cells', visible: false,
                title: 'B cell (plasma cell)',
                components: [
                    'B-cell: small lymphocyte with round nucleus',
                    'Plasma cell: larger with eccentric nucleus',
                    'Clock-face chromatin pattern',
                    'Abundant basophilic cytoplasm',
                    'Rich in rough endoplasmic reticulum',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Lymphoid organs (lymph nodes, spleen)', 'Bone marrow', 'Tissues during immune responses'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['B-cell: antigen recognition via B-cell receptors', 'Plasma cell: antibody production and secretion', 'Central role in humoral immunity'] },
                ],
            },
            {
                id: 7, category: 'cells', visible: false,
                title: 'T cell',
                components: [
                    'Small to medium-sized lymphocytes',
                    'Round, dense nucleus',
                    'Scant cytoplasm',
                    'Helper T-cells (CD4⁺)',
                    'Cytotoxic T-cells (CD8⁺)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Thymus (development)', 'Lymph nodes and spleen', 'Circulating blood', 'Tissue infiltration during immune responses'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Helper T-cells: coordinate immune responses', 'Cytotoxic T-cells: kill infected/abnormal cells', 'Essential for cell-mediated immunity'] },
                ],
            },
            {
                id: 8, category: 'lymphoid', visible: false,
                title: 'Appendix',
                components: [
                    'Simple columnar epithelium with goblet cells',
                    'Submucosa rich in lymphoid follicles',
                    'Germinal centers',
                    'Muscularis externa (two smooth muscle layers)',
                    'Serosa (outer connective tissue)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Attached to cecum of large intestine', 'Part of gut-associated lymphoid tissue (GALT)'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Monitors intestinal lumen for pathogens', 'Facilitates local immune responses', 'IgA production and gut microbiome maintenance'] },
                ],
            },
            {
                id: 9, category: 'cells', visible: false,
                title: 'Granuloma',
                components: [
                    'Central epithelioid macrophages',
                    'Multinucleated giant cells (fused macrophages)',
                    'Rim of lymphocytes',
                    'Fibroblasts',
                    'May show necrotic center (caseating type)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Sites of chronic inflammation', 'Response to persistent pathogens', 'Around foreign substances'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Walls off pathogens that cannot be destroyed', 'Prevents spread of infection', 'Seen in tuberculosis, sarcoidosis'] },
                ],
            },
            {
                id: 10, category: 'cells', visible: false,
                title: 'Neutrophils',
                components: [
                    '10–12 μm diameter cells',
                    'Multi-lobed nucleus (2–5 lobes)',
                    'Thin chromatin strands connecting lobes',
                    'Pale pink cytoplasm',
                    'Fine, neutral-staining granules',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Blood circulation (most abundant WBC)', 'Bone marrow', 'Sites of acute inflammation'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Phagocytosis of bacteria, fungi, debris', 'Degranulation releases antimicrobial proteins', 'NET formation traps microbes', 'First line of defense in acute inflammation'] },
                ],
            },
            {
                id: 11, category: 'lymphoid', visible: false,
                title: 'Red Bone marrow',
                components: [
                    'Hematopoietic cords (developing blood cells)',
                    'Sinusoids (blood-filled spaces)',
                    'Adipocytes (fat cells)',
                    'Stromal cells',
                    'Megakaryocytes (platelet-producing cells)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Flat bones (sternum, ribs, pelvis)', 'Vertebrae', 'Proximal ends of long bones'] },
                    { label: '⚙️ Functions:', type: 'function', items: ['Hematopoiesis (blood cell production)', 'Produces all types of blood cells', 'Primary lymphoid organ for B-cell development'] },
                ],
            },
            {
                id: 12, category: 'autoimmune', visible: false,
                title: 'Rheumatoid arthritis (synovial tissue)',
                components: [
                    'Thickened synovial membrane',
                    'Hyperplastic synoviocytes (type A & B)',
                    'Dense inflammatory infiltrate',
                    'T-cells, B-cells, and plasma cells',
                    'Pannus formation (granulation tissue)',
                    'Proliferation of small blood vessels',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Synovial joints, especially small joints', 'Hands and feet commonly affected'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Autoimmune reaction against joint antigens', 'Genetic predisposition (HLA-DR4)', 'Environmental factors (smoking)'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Joint pain, swelling, and stiffness', 'Morning stiffness >1 hour', 'Reduced mobility and deformity if untreated'] },
                ],
            },
            {
                id: 13, category: 'autoimmune', visible: false,
                title: 'Type 1 diabetes (pancreas)',
                components: [
                    'Reduced or absent β-cells in islets',
                    'Disorganized remaining islet cells',
                    'Inflammatory infiltrate (Insulitis)',
                    'CD8⁺ T-cells, CD4⁺ T-cells',
                    'B-cells and macrophages',
                    'Normal exocrine pancreas',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Islets of Langerhans in pancreas', 'Specifically targets β-cells'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Autoimmune destruction of β-cells', 'Genetic predisposition (HLA-DR3, HLA-DR4)', 'Environmental triggers (viral infections)'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Polyuria, polydipsia, polyphagia', 'Weight loss and fatigue', 'Risk of diabetic ketoacidosis'] },
                ],
            },
            {
                id: 14, category: 'autoimmune', visible: false,
                title: 'Allergic disease (Asthma)',
                components: [
                    'Damaged airway epithelium',
                    'Shedding of epithelial cells',
                    'Inflammatory infiltrate rich in eosinophils',
                    'Mast cells and T-lymphocytes',
                    'Thickened submucosa with fibrosis',
                    'Smooth muscle hypertrophy',
                    'Enlarged mucus glands with plugs',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Airways (bronchi and bronchioles)', 'Respiratory tract'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Hypersensitivity to allergens', 'Genetic predisposition (atopy)', 'Environmental triggers (pollution, smoke)'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Wheezing, shortness of breath', 'Chest tightness and coughing', 'Symptoms worse at night or early morning'] },
                ],
            },
            {
                id: 15, category: 'immunodeficiency', visible: false,
                title: 'AIDS-HIV',
                components: [
                    'Depletion of CD4⁺ T-cells in lymphoid tissues',
                    'Atrophic germinal centers',
                    'Reduced lymphocyte count in blood',
                    'Opportunistic infection pathology',
                    'Pneumocystis in lungs, Kaposi sarcoma',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Lymph nodes, spleen, tonsils', 'Blood circulation', 'Various organs affected by opportunistic infections'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['HIV retrovirus infection', 'Transmission via blood, sexual contact', 'Mother-to-child transmission'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Early: fever, fatigue, lymphadenopathy', 'Progressive: weight loss, recurrent infections', 'AIDS: severe opportunistic infections, cancers'] },
                ],
            },
            {
                id: 16, category: 'cancer', visible: false,
                title: 'Hodgkin lymphoma (HL)',
                components: [
                    'Partial/complete effacement of lymph node architecture',
                    'Reed-Sternberg cells (large, binucleated)',
                    '"Owl\'s eye" appearance with prominent nucleoli',
                    'Mixed inflammatory background',
                    'Lymphocytes, eosinophils, plasma cells',
                    'Fibrosis may be present',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Lymph nodes (neck, axilla, groin)', 'May spread to adjacent lymph node groups'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Exact cause unknown', 'Genetic susceptibility', 'Epstein-Barr virus (EBV) in some cases'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Painless lymph node swelling', 'B symptoms: fever, night sweats, weight loss', 'Fatigue and generalized itching'] },
                ],
            },
            {
                id: 17, category: 'cancer', visible: false,
                title: 'Non-Hodgkin lymphoma (NHL)',
                components: [
                    'Architecture effaced by monomorphic lymphocytes',
                    'Follicular pattern (nodular B-cell clusters)',
                    'Diffuse pattern (sheets of lymphoid cells)',
                    'B-cell lymphomas (most common)',
                    'T-cell lymphomas (less frequent)',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Lymph nodes', 'Extranodal sites (GI tract, skin, CNS)'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Genetic mutations in lymphocytes', 'Immunodeficiency (HIV/AIDS, post-transplant)', 'Viral infections (EBV, HTLV-1)'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Painless lymph node swelling', 'B symptoms in aggressive forms', 'Possible extranodal involvement'] },
                ],
            },
            {
                id: 18, category: 'infectious', visible: false,
                title: 'Leprosy (skin)',
                components: [
                    'Tuberculoid: few lesions, granulomas',
                    'Epithelioid cells, Langhans giant cells',
                    'Lymphocytes, very few bacilli',
                    'Lepromatous: numerous diffuse lesions',
                    'Foamy macrophages with acid-fast bacilli',
                    'Poor granuloma formation',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Skin, peripheral nerves', 'Mucous membranes, eyes'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Mycobacterium leprae infection', 'Prolonged close contact transmission', 'Respiratory droplet spread'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Hypopigmented skin patches with sensory loss', 'Thickened nerves, numbness', 'Advanced: skin nodules, deformities'] },
                ],
            },
            {
                id: 19, category: 'infectious', visible: false,
                title: 'Leprosy (nerve)',
                components: [
                    'Early: perineural and endoneurial infiltration',
                    'Lymphocytes and macrophages',
                    'Tuberculoid: granulomatous inflammation',
                    'Lepromatous: foamy macrophages with bacilli',
                    'Destroyed Schwann cells',
                    'Loss of myelin and axonal degeneration',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Peripheral nervous system', 'Schwann cells in peripheral nerves'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Mycobacterium leprae affinity for Schwann cells', 'Host immune response determines severity', 'Chronic inflammation damages nerves'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Sensory loss: inability to feel pain, heat, touch', 'Motor weakness: muscle wasting, claw hand', 'Autonomic involvement: dry skin, ulcers'] },
                ],
            },
            {
                id: 20, category: 'immunodeficiency', visible: false,
                title: 'Severe Combined Immunodeficiency (SCID)',
                components: [
                    'Hypoplastic or absent thymus',
                    'Lacks cortical and medullary differentiation',
                    'Markedly reduced lymphoid tissue in nodes/spleen',
                    'Absent germinal centers',
                    'Defective lymphocyte development in bone marrow',
                    'Very low lymphocyte count in blood',
                ],
                sections: [
                    { label: '📍 Location:', type: 'location', items: ['Thymus (primary defect)', 'Lymph nodes and spleen', 'Bone marrow', 'Peripheral blood'] },
                    { label: '⚡ Causes:', type: 'causes', items: ['Genetic mutations affecting immune development', 'X-linked SCID (IL-2 receptor γ chain mutation)', 'Adenosine deaminase (ADA) deficiency', 'Other mutations affecting cytokine signaling'] },
                    { label: '🔸 Symptoms:', type: 'symptoms', items: ['Severe recurrent infections (bacterial, viral, fungal)', 'Failure to thrive, chronic diarrhea', 'Fatal in early childhood without treatment'] },
                ],
            },
        ]);

        const filteredSlides = computed(() =>
            slides.filter(s => activeFilter.value === 'all' || s.category === activeFilter.value)
        );

        const handleScroll = () => {
            scrollProgress.value = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            showScrollTop.value = window.scrollY > 500;
        };

        const printPage = () => window.print();
        const scrollTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        const handleImgError = (e) => {
            e.target.style.display = 'none';
            const wrapper = e.target.closest('.image-wrapper');
            if (wrapper) wrapper.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;background:#f8f9fa;border-radius:10px;border:2px dashed #dee2e6;color:#6c757d;font-size:14px;">Image not available</div>';
        };

        onMounted(() => {
            window.addEventListener('scroll', handleScroll);
            nextTick(() => {
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
                document.querySelectorAll('.slide-card').forEach(card => obs.observe(card));
            });
        });

        onUnmounted(() => window.removeEventListener('scroll', handleScroll));

        return { activeFilter, scrollProgress, showScrollTop, filters, slides, filteredSlides, handleImgError, printPage, scrollTop };
    },

    mounted() {
        this.$nextTick(() => {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
            document.querySelectorAll('.slide-card').forEach(card => obs.observe(card));
        });
    }
}).mount('#app');
</script>
