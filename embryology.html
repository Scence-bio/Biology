<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embryology Chapter - بەشی کۆرپەلەناسی</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    @font-face {
      font-family: 'NotoKufiArabic';
      src: url('./NotoKufiArabic-Regular.ttf') format('truetype');
      font-weight: normal;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'NotoKufiArabic', 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 0;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-20px); }
    }
    @keyframes glow {
      0%   { text-shadow: 0 0 30px rgba(236,72,153,0.5); }
      100% { text-shadow: 0 0 50px rgba(236,72,153,0.8); }
    }
    .anim-float { animation: float 6s ease-in-out infinite; }
    .anim-glow  { animation: glow 3s ease-in-out infinite alternate; }

    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(236,72,153,0.2);
    }
    .item-hover {
      transition: transform 0.3s ease;
    }
    .item-hover:hover { transform: translateX(4px); }

    .slide-fade-enter-active,
    .slide-fade-leave-active { transition: opacity 0.35s ease, transform 0.35s ease; }
    .slide-fade-enter-from,
    .slide-fade-leave-to  { opacity: 0; transform: translateY(20px); }

    /* ── Responsive Grid ── */
    .slide-grid {
      display: grid;
      gap: 1.25rem;
      grid-template-columns: 1fr;          /* mobile: 1 col */
    }
    @media (min-width: 640px) {
      .slide-grid { grid-template-columns: repeat(2, 1fr); } /* sm: 2 col */
    }
    @media (min-width: 1024px) {
      .slide-grid { grid-template-columns: repeat(3, 1fr); } /* lg: 3 col */
    }

    /* ── Slide image ── */
    .slide-img {
      width: 100%;
      max-width: 180px;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 0.75rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* ── Filter bar scroll on small screens ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 0 1rem;
    }
    @media (max-width: 480px) {
      .filter-bar {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-btn { white-space: nowrap; flex-shrink: 0; }
    }

    /* ── Back button ── */
    .back-btn {
      text-decoration: none;
      background: #ec4899;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.75rem;
      line-height: 1.4;
      display: inline-block;
    }
    @media (min-width: 640px) {
      .back-btn { padding: 10px 14px; font-size: 0.875rem; }
    }

    /* ── Scroll-to-top & Print ── */
    .scroll-top-btn {
      position: fixed;
      bottom: 90px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #3b82f6;
      color: white;
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(59,130,246,0.4);
      transition: opacity 0.3s, transform 0.3s;
    }
    .print-btn {
      position: fixed;
      bottom: 20px;
      right: 16px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #ec4899;
      color: white;
      font-size: 1.4rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(236,72,153,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }
    .print-btn:hover { transform: translateY(-2px) scale(1.08); }

    @media print {
      .no-print { display: none !important; }
    }

    /* ── Page outer padding ── */
    .page-pad {
      padding: 1rem;
    }
    @media (min-width: 640px) { .page-pad { padding: 1.5rem; } }
    @media (min-width: 1024px) { .page-pad { padding: 2rem 3rem; } }

    /* ── Chapter header text ── */
    .chapter-title { font-size: 1.4rem; }
    @media (min-width: 640px) { .chapter-title { font-size: 2rem; } }
    @media (min-width: 1024px) { .chapter-title { font-size: 2.5rem; } }

    .chapter-sub { font-size: 0.9rem; }
    @media (min-width: 640px) { .chapter-sub { font-size: 1.1rem; } }
  </style>
</head>
<body>

<div id="app">

  <!-- Back button -->
  <div class="fixed left-3 top-3 z-50 no-print" style="max-width:calc(100vw - 6rem)">
    <a href="https://scence-bio.github.io/Biology/" class="back-btn">
      ← گەڕانەوە بۆ سەرەکی

        </div>

        <!-- Filter buttons -->
        <div class="filter-bar mb-6">

        </div>

        <!-- Slide grid -->
        <div class="slide-grid">

            <div v-for="slide in filteredSlides" :key="slide.number"

              <div class="text-white text-center px-4 py-4 relative"

              <!-- Image -->
              <div class="flex justify-center p-4 bg-gray-50">

              </div>

              <!-- Content -->
              <div class="px-4 py-4">

                </div>

                <!-- Components -->

                  <div v-for="(item, i) in slide.components" :key="i"

                  </div>
                </div>

                <!-- Location -->

                  <div class="font-bold text-slate-900 mb-2 flex items-center gap-1 text-xs uppercase tracking-wide">
                    <span class="inline-block w-0.5 h-4 rounded-sm"
                          style="background:linear-gradient(135deg,#a855f7,#ec4899)"></span>
                    📍 Location:
                  </div>
                  <ul class="list-none p-0 m-0">
                    <li v-for="(loc, i) in slide.locations" :key="i"

                        style="background:linear-gradient(135deg,#e0f2fe,#b3e5fc);border-color:#0891b2">

                    </li>
                  </ul>
                </div>

                <!-- Functions -->

                    <span class="inline-block w-0.5 h-4 rounded-sm"
                          style="background:linear-gradient(135deg,#a855f7,#ec4899)"></span>

                    <li v-for="(fn, i) in slide.functions" :key="i"

              </div>
            </div>
          </transition-group>
        </div>

        <!-- Bottom spacer -->
        <div class="h-16"></div>

      </div>
    </div>
  </div>
</div>

    function onScroll() {
      const max = document.documentElement.scrollHeight - window.innerHeight
      progress.value = max > 0 ? (window.scrollY / max) * 100 : 0
      showTop.value = window.scrollY > 500
    }

    function scrollTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

  function buildEmbryology() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f0308);
  makeLights(scene, 0x1a0a00, .6, 0xffd080, 1.2);
  scene.add(makeStars(120, 30));

  const group = new THREE.Group();
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(3.8, 32, 32),
    new THREE.MeshPhongMaterial({ color: 0xfbbf24, transparent: true, opacity: .07, shininess: 200, side: THREE.DoubleSide })
  ));
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(3.8, 20, 20),
    new THREE.MeshPhongMaterial({ color: 0xfcd34d, wireframe: true, transparent: true, opacity: .18 })
  ));

  const bM = new THREE.MeshPhongMaterial({ color: 0xfde68a, emissive: 0x3d1500, shininess: 70, transparent: true, opacity: .9 });
  for (let i = 0; i < 28; i++) {
    const phi = Math.acos(-1 + (2 * i) / 28), theta = Math.sqrt(28 * Math.PI) * phi, r = 3.3;
    const b = new THREE.Mesh(new THREE.SphereGeometry(.58, 12, 12), bM);
    b.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    group.add(b);
  }

  const iM = new THREE.MeshPhongMaterial({ color: 0xf472b6, emissive: 0x3d0025, shininess: 90 });
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    const ic = new THREE.Mesh(new THREE.SphereGeometry(.28, 8, 8), iM);
    ic.position.set(Math.cos(a) * .9, Math.sin(a * .7) * .5, Math.sin(a) * .9);
    group.add(ic);
  }

  scene.add(group);

  // ── Chapter Title Sprite ──────────────────────────────
  function makeChapterLabel(line1, line2) {
    const W = 512, H = 128;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');

    // پشتەوە: تاریک بە گواستراوە
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0,   'rgba(15,3,8,0)');
    grad.addColorStop(0.1, 'rgba(15,3,8,0.82)');
    grad.addColorStop(0.9, 'rgba(15,3,8,0.82)');
    grad.addColorStop(1,   'rgba(15,3,8,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(0, 8, W, H - 16, 14);
    ctx.fill();

    // هێڵی خەمڵێنەر لە سەرەوە
    const accent = ctx.createLinearGradient(0, 0, W, 0);
    accent.addColorStop(0,   'rgba(251,191,36,0)');
    accent.addColorStop(0.3, 'rgba(251,191,36,1)');
    accent.addColorStop(0.7, 'rgba(244,114,182,1)');
    accent.addColorStop(1,   'rgba(244,114,182,0)');
    ctx.fillStyle = accent;
    ctx.fillRect(60, 10, W - 120, 2);

    // Chapter label
    ctx.font = 'bold 22px Georgia, serif';
    ctx.letterSpacing = '4px';
    ctx.fillStyle = 'rgba(251,191,36,0.75)';
    ctx.textAlign = 'center';
    ctx.fillText(line1, W / 2, 46);

    // Main title
    ctx.font = 'bold 38px Georgia, serif';
    ctx.letterSpacing = '1px';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(244,114,182,0.9)';
    ctx.shadowBlur = 18;
    ctx.fillText(line2, W / 2, 92);
    ctx.shadowBlur = 0;

    // هێڵی خەمڵێنەر لە خوارەوە
    ctx.fillStyle = accent;
    ctx.fillRect(60, H - 12, W - 120, 2);

    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
    const sprite = new THREE.Sprite(mat);
    // ئەندازە و شوێن: سەرەوەی گرووپ
    sprite.scale.set(7, 1.75, 1);
    sprite.position.set(0, 6.2, 0);
    return sprite;
  }

  const titleSprite = makeChapterLabel('CHAPTER 2', '🤰 Embryology');
  scene.add(titleSprite);
  // ────────────────────────────────────────────────────

  return {
    scene,
    animate: (t) => {
      group.rotation.y = t * .18;
      group.rotation.x = Math.sin(t * .09) * .12;
      // Sprite هەمیشە ڕووی کامێرا دەگرێتەوە (خۆکارە لە THREE.Sprite)
      // بوونی هەڵەڵاتنی نەرم
      titleSprite.position.y = 6.2 + Math.sin(t * .4) * 0.12;
      titleSprite.material.opacity = 0.85 + Math.sin(t * .6) * 0.12;
    }
  };
}
