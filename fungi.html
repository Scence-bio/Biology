<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fungi Chapter - بەشی کەڕوو</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'NotoKufiArabic';
            src: url('./NotoKufiArabic-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'NotoKufiArabic', 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            line-height: 1.6;
            min-height: 100vh;
            color: #1e293b;
        }

        .book-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.4);
        }

        /* Progress bar */
        .progress-bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: rgba(0,0,0,0.1); z-index: 1000; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #8b5cf6, #ec4899); transition: width 0.3s ease; }

        /* Print btn */
        .print-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #a855f7; color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(168,85,247,0.4);
            z-index: 100; transition: all 0.3s ease;
        }
        .print-btn:hover { transform: translateY(-3px) scale(1.1); box-shadow: 0 8px 20px rgba(168,85,247,0.6); }

        /* Chapter page */
        .chapter-page { padding: 60px 50px; min-height: 100vh; }

        .chapter-header {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: white; padding: 40px; border-radius: 25px;
            margin-bottom: 50px; text-align: center; position: relative; overflow: hidden;
        }
        .chapter-header::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(168,85,247,0.1), rgba(139,92,246,0.1));
        }
        .chapter-number { font-size: 1.3em; opacity: 0.8; margin-bottom: 15px; position: relative; z-index: 2; }
        .chapter-main-title { font-family: 'Georgia', serif; font-size: 2.8em; font-weight: 700; margin-bottom: 20px; position: relative; z-index: 2; }
        .chapter-description { font-size: 1.2em; opacity: 0.9; position: relative; z-index: 2; }

        /* Filter */
        .filter-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn {
            background: #e2e8f0; border: none; padding: 10px 20px;
            border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            font-family: inherit;
        }
        .filter-btn.active, .filter-btn:hover { background: #a855f7; color: white; }

        /* Slide grid */
        .slide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin: 50px 0; }

        /* Slide card */
        .slide-card {
            background: white; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
            overflow: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative; opacity: 0; transform: translateY(50px);
        }
        .slide-card.visible { opacity: 1; transform: translateY(0); }
        .slide-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(168,85,247,0.2); }

        .slide-header {
            background: linear-gradient(135deg, #a855f7, #8b5cf6);
            color: white; padding: 25px; text-align: center; position: relative;
        }
        .slide-header::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: linear-gradient(90deg, #ec4899, #f97316, #eab308);
        }
        .slide-number { font-size: 1.6em; font-weight: 800; }

        .image-wrapper { display: flex; justify-content: center; padding: 20px; background: #f8f9fa; }
        .slide-image {
            width: 200px; height: 200px; object-fit: cover;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #e9ecef;
        }

        .slide-content { padding: 30px; }
        .slide-title { font-weight: 700; color: #0f172a; margin-bottom: 20px; font-size: 1.4em; border-bottom: 2px solid #a855f7; padding-bottom: 10px; }

        .components-list { margin: 20px 0; }
        .components-title { color: #1e293b; font-weight: 700; margin-bottom: 15px; font-size: 1.1em; }
        .component-item {
            background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
            padding: 12px 16px; margin: 8px 0; border-radius: 10px;
            border-left: 4px solid #a855f7; transition: all 0.3s ease;
        }
        .component-item:hover { transform: translateX(5px); background: linear-gradient(135deg, #e9d5ff, #ddd6fe); }

        .location-section, .function-section { margin: 25px 0; }
        .section-title { color: #0f172a; font-weight: 700; margin-bottom: 15px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: linear-gradient(135deg, #8b5cf6, #ec4899); border-radius: 2px; }

        .location-list { list-style: none; padding: 0; margin: 15px 0; }
        .location-list li {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            padding: 12px 16px; margin: 8px 0; border-radius: 10px;
            border-left: 4px solid #f59e0b; transition: all 0.3s ease; position: relative;
        }
        .location-list li:hover { transform: translateX(5px); background: linear-gradient(135deg, #fde68a, #fcd34d); }
        .location-list li::before { content: '🍄'; margin-right: 8px; font-size: 1.1em; }

        .function-list { list-style: none; padding: 0; }
        .function-list li {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            padding: 12px 16px; margin: 8px 0; border-radius: 10px;
            border-left: 4px solid #22c55e; transition: all 0.3s ease; position: relative;
        }
        .function-list li:hover { transform: translateX(5px); background: linear-gradient(135deg, #bbf7d0, #a7f3d0); }
        .function-list li::before { content: '▶'; color: #22c55e; margin-right: 8px; }

        /* Responsive */
        @media (max-width: 992px) { .slide-grid { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); } }
        @media (max-width: 768px) {
            .slide-grid { grid-template-columns: 1fr; }
            .chapter-main-title { font-size: 2em; }
            .chapter-page { padding: 40px 25px; }
        }
        @media (max-width: 480px) { .chapter-main-title { font-size: 1.6em; } }
        @media print {
            .progress-bar, .print-btn { display: none !important; }
            .slide-card { break-inside: avoid; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Back to home -->
    <div style="position:fixed;left:20px;top:20px;z-index:2000">
        <a href="https://scence-bio.github.io/Biology/"
           style="text-decoration:none;background:#a855f7;color:white;padding:10px 14px;border-radius:10px;font-weight:600;">
            back to home - گەڕانەوە بۆ سەرەکی
        </a>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
        <div class="progress-fill" :style="{ width: scrollProgress + '%' }"></div>
    </div>

    <!-- Print button -->
    <button class="print-btn" title="Print Guide" @click="printPage">🖨️</button>

    <div class="book-container">
        <div class="chapter-page" id="fungi">
            <div class="chapter-header">
                <div class="chapter-number">Chapter 9</div>
                <h2 class="chapter-main-title">🍄 Mycology - Study of Fungal Structures</h2>
                <p class="chapter-description">Microscopic examination of fungal spores, cells, and reproductive structures</p>
            </div>

            <!-- Filter controls -->
            <div class="filter-controls">
                <button
                    v-for="f in filters"
                    :key="f.value"
                    class="filter-btn"
                    :class="{ active: activeFilter === f.value }"
                    @click="activeFilter = f.value"
                >{{ f.label }}</button>
            </div>

            <div class="slide-grid">
                <div
                    v-for="slide in filteredSlides"
                    :key="slide.id"
                    class="slide-card"
                    :class="{ visible: slide.visible }"
                    :data-category="slide.category"
                >
                    <div class="slide-header">
                        <div class="slide-number">Slide {{ slide.id }}</div>
                    </div>
                    <div class="image-wrapper">
                        <img
                            :src="'images/Fungi/' + slide.id + '.jpg'"
                            :alt="slide.title"
                            class="slide-image"
                            @error="handleImgError($event)"
                        />
                    </div>
                    <div class="slide-content">
                        <div class="slide-title">{{ slide.title }}</div>

                        <div class="components-list">
                            <div class="components-title">Characteristics:</div>
                            <div class="component-item" v-for="(c, i) in slide.characteristics" :key="i">{{ c }}</div>
                        </div>

                        <template v-for="(section, i) in slide.sections" :key="i">
                            <div :class="section.type === 'function' ? 'function-section' : 'location-section'">
                                <div class="section-title">{{ section.title }}</div>
                                <ul :class="section.type === 'function' ? 'function-list' : 'location-list'">
                                    <li v-for="(item, j) in section.items" :key="j">{{ item }}</li>
                                </ul>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, reactive, onMounted, onUnmounted, nextTick } = Vue;

createApp({

        const filters = [

            { value: 'sexual', label: 'Sexual Spores' },

                ],
                sections: [
                    { title: '🍄 Found in:', type: 'location', items: ['Saccharomyces cerevisiae (baker\'s yeast)', 'Candida species', 'Various environmental sources', 'Food and beverage fermentation'] },
                    { title: '⚙️ Functions:', type: 'function', items: ['Rapid multiplication by budding or fission', 'Fermentation (converts sugars to alcohol and CO₂)', 'Industrial applications (bread, beer, wine)', 'Some cause infections (Candida albicans)'] },
                ],
            },
            {
                id: 3, category: 'asexual', visible: false,
                title: 'Chlamydospore',
                characteristics: [
                    'Thick-walled, asexual spore',

                sections: [
                    { title: '🍄 Found in:', type: 'location', items: ['Rhizopus (bread mold)', 'Mucor species', 'Other Zygomycetes', 'Common on decaying organic matter'] },
                    { title: '⚙️ Functions:', type: 'function', items: ['Primary method of rapid asexual reproduction', 'Efficient dispersal mechanism', 'Can cause plant diseases', 'Some cause opportunistic human infections (mucormycosis)'] },

            {

                ],
                sections: [
                    { title: '🍄 Found in:', type: 'location', items: ['Microsporum species', 'Trichophyton species', 'Various dermatophytes', 'Skin, hair, and nail infections'] },
                    { title: '⚙️ Functions:', type: 'function', items: ['Asexual reproduction and fungal spread', 'Important in dermatophyte life cycles', 'Key diagnostic feature in laboratory identification', 'Helps differentiate dermatophyte species'] },
                ],
            },
            {
                id: 20, category: 'sexual', visible: false,
                title: 'Oospore',
                characteristics: [
                    'Thick-walled sexual spore',
                    'Large, spherical structure',
                    'Yellowish to brown in color',
                    'Formed by fertilization of oosphere with antheridium',
                    'Found inside oogonium after fertilization',
                ],
                sections: [
                    { title: '🍄 Found in:', type: 'location', items: ['Oomycetes (water molds)', 'Phytophthora species', 'Pythium species', 'Aquatic and soil environments'] },
                    { title: '⚙️ Functions:', type: 'function', items: ['Survival in unfavorable conditions', 'Sexual reproduction mechanism', 'Overwintering structure', 'Plant pathogen life cycle completion'] },
                    { title: '🏥 Medical Importance:', type: 'location', items: ['Pythium insidiosum causes keratitis', 'Severe tissue infections in humans', 'Animal infections (pythiosis)', 'Rare but serious pathogen'] },
                ],
            },
        ]);

        const filteredSlides = computed(() =>
            slides.filter(s => activeFilter.value === 'all' || s.category === activeFilter.value)
        );

        const handleScroll = () => {
            scrollProgress.value = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
        };

        const printPage = () => window.print();

        const handleImgError = (e) => {
            e.target.style.display = 'none';
            const wrapper = e.target.closest('.image-wrapper');
            if (wrapper) {
                wrapper.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;background:#f8f9fa;border-radius:10px;border:2px dashed #dee2e6;color:#6c757d;font-size:14px;">Image not available</div>';
            }
        };

        onMounted(() => {
            window.addEventListener('scroll', handleScroll);
            nextTick(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
                document.querySelectorAll('.slide-card').forEach(card => observer.observe(card));
            });
        });

        onUnmounted(() => window.removeEventListener('scroll', handleScroll));

        return {
            activeFilter, scrollProgress, filters,
            slides, filteredSlides,
            handleImgError, printPage,
        };
    },

    mounted() {
        this.$nextTick(() => {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
            document.querySelectorAll('.slide-card').forEach(card => obs.observe(card));
        });
    }
}).mount('#app');
</script>
</body>
</html>
