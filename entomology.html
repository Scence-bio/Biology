<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entomology Chapter - بەشی مێروولەزانی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #21262d;
            --accent-green: #39d353;
            --accent-blue: #58a6ff;
            --accent-amber: #e3b341;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #484f58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* HEADER */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(57,211,83,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57,211,83,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
        }

        .hero-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(57,211,83,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 15vw, 13rem);
            letter-spacing: 0.05em;
            line-height: 0.9;
            background: linear-gradient(135deg, #39d353 0%, #58a6ff 50%, #bc8cff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            margin-top: 1rem;
        }

        .hero-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-green);
            border: 1px solid rgba(57,211,83,0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 2px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            margin-bottom: 2rem;
            background: rgba(57,211,83,0.05);
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            z-index: 2;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent-green), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.2); }
        }

        /* NAV */
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,12,16,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .filter-pill {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            padding: 0.4rem 1rem;
            border-radius: 2px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .filter-pill:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .filter-pill.active {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: var(--bg);
            font-weight: 700;
        }

        .filter-pill.pest.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .filter-pill.social.active {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        /* SEARCH */
        .search-field {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            outline: none;
            width: 240px;
            transition: border-color 0.2s;
        }

        .search-field:focus {
            border-color: var(--accent-green);
        }

        .search-field::placeholder {
            color: var(--text-dim);
        }

        /* CARDS */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .insect-card {
            background: var(--surface);
            transition: background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .insect-card:hover {
            background: var(--surface2);
        }

        .insect-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent-green)), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .insect-card:hover::before {
            opacity: 1;
        }

        .card-inner {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 280px;
        }

        .card-image-side {
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .card-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.05);
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        .insect-card:hover .card-image-side img {
            filter: grayscale(0%) contrast(1.1);
            transform: scale(1.04);
        }

        .slide-num {
            position: absolute;
            bottom: 0;
            left: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            line-height: 1;
            color: rgba(255,255,255,0.06);
            padding: 0.25rem 0.5rem;
            pointer-events: none;
        }

        .cat-dot {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .cat-dot.beneficial { background: var(--accent-green); box-shadow: 0 0 8px rgba(57,211,83,0.6); }
        .cat-dot.pest { background: var(--accent-red); box-shadow: 0 0 8px rgba(248,81,73,0.6); }
        .cat-dot.social { background: var(--accent-purple); box-shadow: 0 0 8px rgba(188,140,255,0.6); }

        .img-placeholder {
            width: 100%;
            height: 100%;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 2rem;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card-names {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .sci-name {
            font-family: 'DM Sans', sans-serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--accent-green);
            font-weight: 500;
        }

        .common-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .slide-type-badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 1px;
            width: fit-content;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }

        .feature-item {
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 0.4rem 0.6rem;
            border-left: 2px solid var(--border);
            margin-bottom: 0.3rem;
            line-height: 1.5;
            transition: border-color 0.2s, color 0.2s;
        }

        .insect-card:hover .feature-item {
            border-left-color: var(--accent-green);
            color: var(--text);
        }

        .importance-box {
            background: rgba(57,211,83,0.04);
            border: 1px solid rgba(57,211,83,0.15);
            border-radius: 2px;
            padding: 0.75rem;
        }

        .importance-item {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(57,211,83,0.08);
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .importance-item:last-child { border-bottom: none; }

        .importance-item::before {
            content: '→';
            color: var(--accent-green);
            font-size: 0.75rem;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }

        /* cat color overrides */
        .card-pest .insect-card:hover .feature-item,
        .pest-card:hover .feature-item { border-left-color: var(--accent-red) !important; }
        .card-social .insect-card:hover .feature-item,
        .social-card:hover .feature-item { border-left-color: var(--accent-purple) !important; }

        [data-cat="pest"]:hover .feature-item { border-left-color: var(--accent-red); }
        [data-cat="social"]:hover .feature-item { border-left-color: var(--accent-purple); }

        [data-cat="pest"]::before { --card-accent: var(--accent-red); }
        [data-cat="social"]::before { --card-accent: var(--accent-purple); }
        [data-cat="beneficial"]::before { --card-accent: var(--accent-green); }

        /* count bar */
        .count-bar {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        /* home button */
        .home-btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2px;
            transition: all 0.2s;
            background: transparent;
        }

        .home-btn:hover {
            border-color: var(--accent-amber);
            color: var(--accent-amber);
        }

        /* progress bar */
        .progress-track {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: transparent;
            z-index: 200;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            transition: width 0.1s linear;
        }

        /* print btn */
        .print-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: all 0.2s;
            z-index: 100;
        }

        .print-btn:hover {
            border-color: var(--accent-amber);
            color: var(--accent-amber);
        }

        /* Functions list */
        .func-item {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 0.25rem 0;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .func-item::before {
            content: '◦';
            color: var(--accent-blue);
            flex-shrink: 0;
        }

        /* No results */
        .no-results {
            grid-column: 1/-1;
            padding: 4rem 2rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        /* transition */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s, transform 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(10px); }

        @media (max-width: 640px) {
            .card-inner { grid-template-columns: 1fr; }
            .card-image-side { height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
            .card-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 5rem; }
        }

        @media print {
            .sticky-nav, .print-btn, .progress-track, .home-btn { display: none !important; }
            .insect-card { break-inside: avoid; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Progress Bar -->
    <div class="progress-track">
        <div class="progress-fill" :style="{ width: scrollProgress + '%' }"></div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-grid"></div>
        <div class="hero-glow"></div>
        <div style="position:relative;z-index:2;text-align:center;padding:2rem;">
            <div class="hero-badge">🔬 Microscopy Lab · بەشی مێروولەزانی</div>
            <h1 class="hero-title">ENTOMOLOGY</h1>
            <p class="hero-subtitle">Study of Insects · {{ insects.length }} Specimens</p>
        </div>
        <div class="scroll-hint">
            <div class="scroll-line"></div>
            <span>SCROLL</span>
        </div>
        <!-- Home btn in hero -->
        <div style="position:absolute;top:1.5rem;left:1.5rem;z-index:10;">
            <a href="https://scence-bio.github.io/Biology/" class="home-btn">← Back to Home</a>
        </div>
    </section>

    <!-- Sticky Nav -->
    <nav class="sticky-nav">
        <div style="max-width:1400px;margin:0 auto;padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <button class="filter-pill" :class="{ active: activeFilter === 'all' }" @click="setFilter('all')">All</button>
                <button class="filter-pill beneficial" :class="{ active: activeFilter === 'beneficial' }" @click="setFilter('beneficial')">Beneficial</button>
                <button class="filter-pill pest" :class="{ active: activeFilter === 'pest' }" @click="setFilter('pest')">Pest</button>
                <button class="filter-pill social" :class="{ active: activeFilter === 'social' }" @click="setFilter('social')">Social</button>
                <span class="count-bar">{{ filteredInsects.length }}/{{ insects.length }}</span>
            </div>
            <input class="search-field" v-model="searchQuery" placeholder="Search species..." />
        </div>
    </nav>

    <!-- Grid -->
    <main style="max-width:1400px;margin:0 auto;">
        <div class="card-grid">
            <template v-if="filteredInsects.length > 0">
                <div
                    v-for="insect in filteredInsects"
                    :key="insect.id"
                    class="insect-card"
                    :data-cat="insect.category"
                >
                    <div class="card-inner">
                        <!-- Image side -->
                        <div class="card-image-side">
                            <div class="cat-dot" :class="insect.category"></div>
                            <img
                                :src="insect.image"
                                :alt="insect.scientificName"
                                @error="handleImgError($event, insect)"
                                v-show="!insect.imgFailed"
                            />
                            <div class="img-placeholder" v-show="insect.imgFailed">
                                <span>{{ insect.icon }}</span>
                            </div>
                            <div class="slide-num">{{ String(insect.id).padStart(2,'0') }}</div>
                        </div>

                        <!-- Body -->
                        <div class="card-body">
                            <div class="card-names">
                                <div class="sci-name">{{ insect.scientificName }}</div>
                                <div class="common-name">{{ insect.commonName }}</div>
                            </div>
                            <div class="slide-type-badge">{{ insect.slideType }}</div>

                            <div v-if="insect.features && insect.features.length">
                                <div class="section-label">Key Features</div>
                                <div v-for="f in insect.features.slice(0,3)" :key="f" class="feature-item">{{ f }}</div>
                            </div>

                            <div v-if="insect.functions && insect.functions.length">
                                <div class="section-label">Functions</div>
                                <div v-for="fn in insect.functions.slice(0,2)" :key="fn" class="func-item">{{ fn }}</div>
                            </div>

                            <div class="importance-box" v-if="insect.importance && insect.importance.length">
                                <div class="section-label" style="color:var(--accent-green);margin-bottom:0.5rem;">Importance</div>
                                <div v-for="imp in insect.importance" :key="imp" class="importance-item">{{ imp }}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div v-else class="no-results">NO SPECIMENS FOUND · بۆچوونێک نەدۆزرایەوە</div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="border-top:1px solid var(--border);padding:2rem;text-align:center;margin-top:1px;">
        <p style="font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;">
            Entomology Study Guide · {{ insects.length }} Specimens · Microscopic Examination
        </p>
    </footer>

    <!-- Print btn -->
    <button class="print-btn" @click="window.print()" title="Print">🖨️</button>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
    setup() {
        const activeFilter = ref('all');
        const searchQuery = ref('');
        const scrollProgress = ref(0);

        const insects = ref([
            {
                id: 1, category: 'beneficial', icon: '🐝',
                image: 'images/Entomology/1.jpg',
                scientificName: 'Scientific name: Apis mellifera',
                commonName: 'Common name: Western Honeybee',
                slideType: 'Slide type: Whole Mount (W.M.)',
                features: [
                    'Pollen Basket (Corbicula) - concave area on hind legs with stiff hairs',
                    'Proboscis - long, tube-like mouthpart for sucking nectar',
                ],
                functions: [
                    'Pollen collection and transport to hive',
                    'Nectar feeding from flowers',
                    'Proboscis can extend for feeding and coil when not in use',
                ],
                importance: [
                    'Understanding pollination biology',
                    'Reveals foraging behavior of bees',
                    'Demonstrates evolutionary adaptation of insect mouthparts',
                ],
                imgFailed: false
            },
            {
                id: 2, category: 'pest', icon: '🦟',
                image: 'images/Entomology/2.jpg',
                scientificName: 'Scientific name: Anopheles spp.',
                commonName: 'Common name: Mosquito (Malaria vector species)',
                slideType: 'Slide type: Longitudinal Section (L.S.)',
                features: [
                    'Head Capsule - contains compound eyes and antennae with sensory hairs',
                    'Mouthparts (Proboscis Complex) - specialized for blood-feeding',
                    'Labrum - forms food canal for sucking blood',
                    'Mandibles & Maxillae - cut into host\'s skin',
                    'Hypopharynx - delivers saliva with anticoagulants',
                    'Sensory Palps - detect heat, moisture, and host odors',
                ],
                importance: [
                    'Understanding vector biology and malaria transmission',
                    'Species identification in mosquito research',
                    'Evolution of piercing-sucking mouthparts',
                ],
                imgFailed: false
            },
            {
                id: 3, category: 'pest', icon: '🪰',
                image: 'images/Entomology/3.jpg',
                scientificName: 'Scientific name: Musca domestica',
                commonName: 'Common name: Housefly',
                slideType: 'Slide type: Whole Mount (W.M.)',
                features: [
                    'Tarsal Claws - at tip of each leg for gripping rough surfaces',
                    'Pulvilli - pad-like structures beneath claws with sticky hairs',
                    'Sensory Hairs - detect surface texture and chemicals',
                ],
                functions: [
                    'Mechanical anchoring during walking or landing',
                    'Walking on smooth vertical or inverted surfaces',
                    'Movement coordination and feeding behavior',
                ],
                importance: [
                    'Demonstrates insect locomotion adaptations',
                    'Surface adhesion mechanisms in insects',
                    'Understanding how flies contaminate surfaces',
                ],
                imgFailed: false
            },
            {
                id: 4, category: 'beneficial', icon: '🐛',
                image: 'images/Entomology/4.jpg',
                scientificName: 'Scientific name: Bombyx mori',
                commonName: 'Common name: Silkworm',
                slideType: 'Slide type: Whole Mount (W.M.)',
                features: [
                    'Segmented body - head, thorax, abdomen',
                    'Chewing mouthparts adapted for mulberry leaves',
                    'Prolegs and spiracles visible',
                    'Large paired silk glands for silk production',
                ],
                importance: [
                    'Source of natural silk (sericulture industry)',
                    'Model organism in biotechnology and genetics',
                    'Pupae used as food and animal feed',
                ],
                imgFailed: false

                const q = searchQuery.value.toLowerCase();
                const matchSearch = !q ||
                    insect.scientificName.toLowerCase().includes(q) ||
                    insect.commonName.toLowerCase().includes(q);
                return matchCat && matchSearch;
            });
        });

        const setFilter = (f) => { activeFilter.value = f; };

        const handleImgError = (event, insect) => {
            insect.imgFailed = true;
        };

        const onScroll = () => {
            const scrolled = window.scrollY;
            const total = document.documentElement.scrollHeight - window.innerHeight;
            scrollProgress.value = total > 0 ? (scrolled / total) * 100 : 0;
        };

        onMounted(() => { window.addEventListener('scroll', onScroll); });
        onUnmounted(() => { window.removeEventListener('scroll', onScroll); });

        return {
            insects,
            filteredInsects,
            activeFilter,
            searchQuery,
            scrollProgress,
            setFilter,
            handleImgError,
            window,
