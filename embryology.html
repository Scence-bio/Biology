<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    @font-face {
      font-family: 'NotoKufiArabic';
      src: url('./NotoKufiArabic-Regular.ttf') format('truetype');
      font-weight: normal;
    }
    body {
      font-family: 'NotoKufiArabic', 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-20px); }
    }
    @keyframes glow {
      0%   { text-shadow: 0 0 30px rgba(236,72,153,0.5); }
      100% { text-shadow: 0 0 50px rgba(236,72,153,0.8); }
    }
    .anim-float { animation: float 6s ease-in-out infinite; }
    .anim-glow  { animation: glow 3s ease-in-out infinite alternate; }
    .card-hover:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(236,72,153,0.2);
    }
    .item-hover:hover { transform: translateX(5px); }
    .slide-fade-enter-active,
    .slide-fade-leave-active { transition: opacity 0.35s ease, transform 0.35s ease; }
    .slide-fade-enter-from,
    .slide-fade-leave-to  { opacity: 0; transform: translateY(20px); }
    @media print {
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>

<div id="app">

       style="text-decoration:none;background:#ec4899;color:white;padding:10px 14px;border-radius:10px;font-weight:600;">

  </div>

  </div>

            <h2 class="font-bold mb-5" style="font-family:Georgia,serif;font-size:2.5rem">
              🤰🏻 Embryology - Study of Development
            </h2>
            <p class="text-xl" style="opacity:0.9">

            </p>
          </div>
        </div>

      progress.value = max > 0 ? (window.scrollY / max) * 100 : 0
      showTop.value = window.scrollY > 500
    }

    function scrollTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

</body>
</html>
