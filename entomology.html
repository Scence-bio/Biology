<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbiology Chapter - بەشی میکرۆبایۆلۆژی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #21262d;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-amber: #e3b341;
            --accent-purple: #bc8cff;
            --accent-green: #39d353;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #484f58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* HERO */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(248,81,73,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(248,81,73,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
        }

        .hero-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(248,81,73,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 13vw, 12rem);
            letter-spacing: 0.05em;
            line-height: 0.9;
            background: linear-gradient(135deg, #f85149 0%, #bc8cff 50%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            margin-top: 1rem;
        }

        .hero-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-red);
            border: 1px solid rgba(248,81,73,0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 2px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            margin-bottom: 2rem;
            background: rgba(248,81,73,0.05);
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            z-index: 2;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent-red), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.2); }
        }

        /* NAV */
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,12,16,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .filter-pill {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            padding: 0.4rem 1rem;
            border-radius: 2px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .filter-pill:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .filter-pill.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: var(--bg);
            font-weight: 700;
        }

        .filter-pill.gram-pos.active { background: var(--accent-purple); border-color: var(--accent-purple); }
        .filter-pill.gram-neg.active { background: var(--accent-blue); border-color: var(--accent-blue); }
        .filter-pill.spore.active { background: var(--accent-amber); border-color: var(--accent-amber); color: #000; }

        /* SEARCH */
        .search-field {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            outline: none;
            width: 240px;
            transition: border-color 0.2s;
        }

        .search-field:focus { border-color: var(--accent-red); }
        .search-field::placeholder { color: var(--text-dim); }

        /* GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .bacteria-card {
            background: var(--surface);
            transition: background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .bacteria-card:hover { background: var(--surface2); }

        .bacteria-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent-red)), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bacteria-card:hover::before { opacity: 1; }

        [data-cat="gram-positive"]::before { --card-accent: var(--accent-purple); }
        [data-cat="gram-negative"]::before { --card-accent: var(--accent-blue); }
        [data-cat="spore-forming"]::before { --card-accent: var(--accent-amber); }

        .card-inner {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 280px;
        }

        .card-image-side {
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .card-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.05);
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        .bacteria-card:hover .card-image-side img {
            filter: grayscale(0%) contrast(1.1);
            transform: scale(1.04);
        }

        .slide-num {
            position: absolute;
            bottom: 0; left: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            line-height: 1;
            color: rgba(255,255,255,0.06);
            padding: 0.25rem 0.5rem;
            pointer-events: none;
        }

        .cat-dots {
            position: absolute;
            top: 0.75rem; left: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cat-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
        }

        .cat-dot.gram-positive { background: var(--accent-purple); box-shadow: 0 0 6px rgba(188,140,255,0.6); }
        .cat-dot.gram-negative { background: var(--accent-blue); box-shadow: 0 0 6px rgba(88,166,255,0.6); }
        .cat-dot.spore-forming { background: var(--accent-amber); box-shadow: 0 0 6px rgba(227,179,65,0.6); }

        .img-placeholder {
            width: 100%;
            height: 100%;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 2.5rem;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow: hidden;
        }

        .card-title-row {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .bact-name {
            font-family: 'DM Sans', sans-serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--accent-red);
            font-weight: 600;
        }

        .cat-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 0.4rem;
        }

        .cat-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.15rem 0.5rem;
            border-radius: 1px;
            border: 1px solid;
        }

        .cat-tag.gram-positive { color: var(--accent-purple); border-color: rgba(188,140,255,0.3); background: rgba(188,140,255,0.05); }
        .cat-tag.gram-negative { color: var(--accent-blue); border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.05); }
        .cat-tag.spore-forming { color: var(--accent-amber); border-color: rgba(227,179,65,0.3); background: rgba(227,179,65,0.05); }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.35rem;
        }

        .char-item {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 0.35rem 0.6rem;
            border-left: 2px solid var(--border);
            margin-bottom: 0.25rem;
            line-height: 1.5;
            transition: border-color 0.2s, color 0.2s;
        }

        .bacteria-card:hover .char-item {
            border-left-color: var(--accent-red);
            color: var(--text);
        }

        .virulence-box {
            background: rgba(188,140,255,0.04);
            border: 1px solid rgba(188,140,255,0.12);
            border-radius: 2px;
            padding: 0.7rem;
        }

        .virulence-item {
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 0.22rem 0;
            border-bottom: 1px solid rgba(188,140,255,0.07);
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .virulence-item:last-child { border-bottom: none; }

        .virulence-item::before {
            content: '◦';
            color: var(--accent-purple);
            flex-shrink: 0;
            font-size: 0.85rem;
        }

        .clinical-box {
            background: rgba(88,166,255,0.04);
            border: 1px solid rgba(88,166,255,0.12);
            border-radius: 2px;
            padding: 0.7rem;
        }

        .clinical-item {
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 0.22rem 0;
            border-bottom: 1px solid rgba(88,166,255,0.07);
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .clinical-item:last-child { border-bottom: none; }

        .clinical-item::before {
            content: '→';
            color: var(--accent-blue);
            flex-shrink: 0;
            font-size: 0.75rem;
            margin-top: 0.1rem;
        }

        .count-bar {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .home-btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2px;
            transition: all 0.2s;
            background: transparent;
        }

        .home-btn:hover { border-color: var(--accent-amber); color: var(--accent-amber); }

        .progress-track {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: transparent;
            z-index: 200;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-purple));
            transition: width 0.1s linear;
        }

        .print-btn {
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 44px; height: 44px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: all 0.2s;
            z-index: 100;
        }

        .print-btn:hover { border-color: var(--accent-amber); color: var(--accent-amber); }

        .no-results {
            grid-column: 1/-1;
            padding: 4rem 2rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 640px) {
            .card-inner { grid-template-columns: 1fr; }
            .card-image-side { height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
            .card-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 4rem; }
        }

        @media print {
            .sticky-nav, .print-btn, .progress-track { display: none !important; }
            .bacteria-card { break-inside: avoid; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body>
<div id="app">

    <div class="progress-track">
        <div class="progress-fill" :style="{ width: scrollProgress + '%' }"></div>
    </div>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-grid"></div>
        <div class="hero-glow"></div>
        <div style="position:relative;z-index:2;text-align:center;padding:2rem;">
            <div class="hero-badge">🦠 Chapter 6 · بەشی میکرۆبایۆلۆژی</div>
            <h1 class="hero-title">MICROBIOLOGY</h1>
            <p class="hero-subtitle">Study of Microorganisms · {{ slides.length }} Specimens</p>
        </div>
        <div class="scroll-hint">
            <div class="scroll-line"></div>
            <span>SCROLL</span>
        </div>
        <div style="position:absolute;top:1.5rem;left:1.5rem;z-index:10;">
            <a href="https://scence-bio.github.io/Biology/" class="home-btn">← Back to Home</a>
        </div>
    </section>

    <!-- NAV -->
    <nav class="sticky-nav">
        <div style="max-width:1400px;margin:0 auto;padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <button class="filter-pill" :class="{ active: activeFilter === 'all' }" @click="setFilter('all')">All</button>
                <button class="filter-pill gram-pos" :class="{ active: activeFilter === 'gram-positive' }" @click="setFilter('gram-positive')">Gram +</button>
                <button class="filter-pill gram-neg" :class="{ active: activeFilter === 'gram-negative' }" @click="setFilter('gram-negative')">Gram −</button>
                <button class="filter-pill spore" :class="{ active: activeFilter === 'spore-forming' }" @click="setFilter('spore-forming')">Spore Forming</button>
                <span class="count-bar">{{ filteredSlides.length }}/{{ slides.length }}</span>
            </div>
            <input class="search-field" v-model="searchQuery" placeholder="Search bacteria..." />
        </div>
    </nav>

    <!-- GRID -->
    <main style="max-width:1400px;margin:0 auto;">
        <div class="card-grid">
            <template v-if="filteredSlides.length > 0">
                <div
                    v-for="slide in filteredSlides"
                    :key="slide.id"
                    class="bacteria-card"
                    :data-cat="slide.categories[0]"
                >
                    <div class="card-inner">
                        <!-- Image -->
                        <div class="card-image-side">
                            <div class="cat-dots">
                                <div v-for="cat in slide.categories" :key="cat" class="cat-dot" :class="cat"></div>
                            </div>
                            <img
                                :src="slide.image"
                                :alt="slide.title"
                                @error="handleImgError($event, slide)"
                                v-show="!slide.imgFailed"
                            />
                            <div class="img-placeholder" v-show="slide.imgFailed">🦠</div>
                            <div class="slide-num">{{ String(slide.id).padStart(2,'0') }}</div>
                        </div>

                        <!-- Body -->
                        <div class="card-body">
                            <div class="card-title-row">
                                <div class="bact-name">{{ slide.title }}</div>
                                <div class="cat-tags">
                                    <span v-for="cat in slide.categories" :key="cat" class="cat-tag" :class="cat">{{ cat }}</span>
                                </div>
                            </div>

                            <div v-if="slide.characteristics && slide.characteristics.length">
                                <div class="section-label">🔬 Identification & Characteristics</div>
                                <div v-for="c in slide.characteristics.slice(0,3)" :key="c" class="char-item">{{ c }}</div>
                            </div>

                            <div v-if="slide.virulence && slide.virulence.length" class="virulence-box">
                                <div class="section-label" style="color:var(--accent-purple);margin-bottom:0.4rem;">🦠 Virulence & Pathogenicity</div>
                                <div v-for="v in slide.virulence.slice(0,3)" :key="v" class="virulence-item">{{ v }}</div>
                            </div>

                            <div v-if="slide.clinical && slide.clinical.length" class="clinical-box">
                                <div class="section-label" style="color:var(--accent-blue);margin-bottom:0.4rem;">🏥 Clinical Importance</div>
                                <div v-for="cl in slide.clinical.slice(0,3)" :key="cl" class="clinical-item">{{ cl }}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div v-else class="no-results">NO SPECIMENS FOUND · بۆچوونێک نەدۆزرایەوە</div>
        </div>
    </main>

    <footer style="border-top:1px solid var(--border);padding:2rem;text-align:center;margin-top:1px;">
        <p style="font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;">
            Microbiology Study Guide · Chapter 6 · {{ slides.length }} Bacterial Specimens
        </p>
    </footer>

    <button class="print-btn" @click="printPage" title="Print">🖨️</button>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
    setup() {
        const scrollProgress = ref(0);
        const activeFilter = ref('all');
        const searchQuery = ref('');

        const slides = ref([
            {
                id: 1, categories: ['gram-positive'], imgFailed: false,
                title: 'Staphylococcus aureus',
                image: 'images/Microbiology/1.jpg',
                characteristics: ['Gram-positive cocci in clusters (purple under Gram stain)','Catalase test: positive','Coagulase test: positive','Grows on Mannitol Salt Agar and ferments mannitol (turns medium yellow)','Shows gamma-hemolysis (no hemolysis) on blood agar'],
                virulence: ['Found naturally on the skin, in the nose, and mucous membranes','Coagulase (clots plasma)','Protein A (binds antibodies to evade immune system)','Toxins: TSST-1 and enterotoxins (cause toxic shock and food poisoning)','Major concern for antibiotic resistance, especially MRSA strains'],
                clinical: ['Skin infections like boils, abscesses, and impetigo','Respiratory infections, such as pneumonia','Systemic infections: sepsis, osteomyelitis, and endocarditis','Toxin-related illnesses: food poisoning and toxic shock syndrome']
            },
            {
                id: 2, categories: ['gram-positive'], imgFailed: false,
                title: 'Streptococcus pyogenes',
                image: 'images/Microbiology/2.jpg',
                characteristics: ['Gram-positive cocci in chains (purple spheres in lines)','Catalase test: Negative (helps distinguish from staphylococci)','Beta-hemolytic on blood agar (clear zone around colonies)','Group A Streptococcus (GAS), based on Lancefield classification'],
                virulence: ['M protein: resists phagocytosis','Streptolysins O and S: lyse red blood cells','Exotoxins: cause toxic shock and scarlet fever','Spread by respiratory droplets or contact with infected wounds'],
                clinical: ['Common infections: strep throat (pharyngitis) and impetigo','Scarlet fever','Rheumatic fever','Post-streptococcal glomerulonephritis','Necrotizing fasciitis ("flesh-eating disease")','Toxic shock-like syndrome']
            },
            {
                id: 3, categories: ['gram-positive'], imgFailed: false,
                title: 'Enterococcus faecium',
                image: 'images/Microbiology/3.jpg',
                characteristics: ['Gram-positive cocci in pairs or short chains','Catalase test: Negative','Gamma-hemolytic or alpha-hemolytic on blood agar','Grows in 6.5% NaCl and bile-esculin agar (blackening)','Can survive harsh conditions including high salt and temperature','Intrinsically resistant to many antibiotics'],
                virulence: ['Adhesins: facilitate attachment to host tissues','Cytolysin: can lyse red blood cells and other cell types','Ability to form biofilms on medical devices','Vancomycin-resistant Enterococcus (VRE) is a major clinical concern','Spread primarily via direct contact in healthcare settings'],
                clinical: ['Causes urinary tract infections (UTIs)','Bacteremia and endocarditis in immunocompromised patients','Intra-abdominal and wound infections','Associated with antibiotic-resistant infections']
            },
            {
                id: 4, categories: ['gram-positive','spore-forming'], imgFailed: false,
                title: 'Bacillus anthracis',
                image: 'images/Microbiology/4.jpg',
